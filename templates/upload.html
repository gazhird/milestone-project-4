<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Bidder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"  rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">


</head>
<body>
    <main>

    <!-- Navbar -->
    {% include 'includes/navbar.html' %}

    <section id="upload-section" >
        <div class="container-fluid pt-4">
            <h1>Upload Vehicle</h1> 
            <form method="post" action="{% url 'upload' %}" enctype="multipart/form-data" class="upload-form">
                {% csrf_token %}
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="make" >Make</label>
                        <input id="make" type="text" name="make" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="model" >Model</label>
                        <input id="model" type="text" name="model" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="year" >Manufactured Year</label>
                        <input id="year" type="number" name="year" required>
                    </div>
                
                    <div class="form-group">
                        <label for="registration" >Vehicle Registration</label>
                        <input id="registration" type="text" name="registration" required>
                </div>
                </div>

                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="mileage" >Mileage</label>
                        <input id="mileage" type="number" name="mileage" required>
                    </div>

                    <div class="form-group">
                        <label for="fuel" >Fuel Type</label>
                            <select name="fuel" id="fuel" required>
                            <option value="">Select Fuel Type</option>
                            <option value="petrol">Petrol</option>
                            <option value="diesel">Diesel</option>
                            <option value="electric">Electric</option>
                            <option value="hybrid">Hybrid</option>
                        </select>
                    </div>
    
                    <div class="form-group">
                    <label for="transmission" >Transmission</label>
                    <select name="transmission" id="transmission" required>
                        <option value="">Select Transmission</option>
                        <option value="manual">Manual</option>
                        <option value="automatic">Automatic</option>
                    </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                    <label for="condition" >Condition</label>
                    <select name="condition" id="condition" required>
                        <option value="">Select Condition</option>
                        <option value="excellent">Excellent</option>
                        <option value="good">Good</option>
                        <option value="average">Average</option>
                        <option value="nonrunner">Non Runner</option>
                    </select>
                    </div>

                    <div class="form-group">
                        <label for="colour" >Colour</label>
                        <input id="colour" type="text" name="colour" required>
                    </div>


                    <div class="form-group">
                        <label for="doors">Number of Doors</label>
                        <input id="doors" type="number" name="doors" required>
                    </div>
                </div>

                <div class="form-group">
                <label for="description" >Description</label>
                <textarea id="description" name="description" required></textarea>
                </div>

                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="start_price" >Start Price</label>
                        <input id="start_price" type="number" name="starting_price" step="0.01" required>
                    </div>


                    <div class="form-row">
                        <div class="form-group">
                            <label for="end_date">End Date</label>
                            <input id="end_date" type="date" name="end_date" required>
                        </div>
                        <div class="form-group">
                            <label for="end_time">End Time</label>
                            <input id="end_time" type="time" name="end_time" required>
                        </div>
                    </div>
                </div>


                <div class="form-group">
                <label for="image1" >Required Image</label>
                <input id="image1" type="file" name="image1" accept="image/*" required>
                </div>

                <div class="form-group">
                <label for="image2" >Optional Image</label>
                <input id="image2" type="file" name="image2" accept="image/*">
                </div>

                <div class="form-group">
                <label for="image3" >Optional Image</label>
                <input id="image3" type="file" name="image3" accept="image/*">
                </div>

                <div class="form-group">
                <label for="image4" >Optional Image</label>
                <input id="image4" type="file" name="image4" accept="image/*">
                </div>

                <div class="form-group">
                <button type="submit" class="btn btn-primary">List Vehicle</button>
                </div>

             </form>
        </div> 
    </section>


    

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/time.js' %}" ></script>
    <script src="{% static 'js/main.js' %}" ></script>
</body>
</html>
